services:
  backend:
    build:
      context: ./backend
    container_name: uniassist-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_PATH: /data/data.db
      ALLOW_ORIGINS: ${ALLOW_ORIGINS}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    volumes:
      - backend-data:/data
      - backend-uploads:/app/uploads
    networks:
      - web

  frontend:
    build:
      context: ./frontend
    container_name: uniassist-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_URL: http://uniassist-backend:3001
    depends_on:
      - backend
    networks:
      - web

volumes:
  backend-data:
  backend-uploads:

networks:
  web:
    external: true